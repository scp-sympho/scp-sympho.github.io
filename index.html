<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュース＆会社情報まとめ</title>
<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #f7faff;
    margin: 0;
    padding: 20px;
    color: #333;
}

h1 {
    text-align: center;
    color: #0078d7;
    position: relative;
}

.viewer-counter {
    position: absolute;
    top: 0;
    right: 10px;
    font-size: 12px;
    color: #888;
}

.viewer-info {
    position: absolute;
    top: 5px;
    right: 10px;
    font-size: 12px;
    color: #888;
    text-align: right;
}

.subtitle {
    margin-top: -0.3em;
    font-size: 0.95em;
    color: #555;
    text-align: center;
    letter-spacing: 0.03em;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
}

.tab {
    background: #e0ecff;
    border: none;
    border-radius: 8px;
    padding: 10px 15px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.tab.active {
    background: #0078d7;
    color: white;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

input, select, button {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.news-list, .research-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
}

.info-list{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
    gap: 15px;
}


.card {
    display: flex;
    flex-direction: column;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    padding: 15px;
    transition: transform 0.2s;
    position: relative;
    overflow: visible;
}

.card:hover {
    transform: scale(1.02);
}

.card a {
    color: #0078d7;
    text-decoration: none;
    font-weight: bold;
}

.card a:hover {
    text-decoration: underline;
}

.date {
    color: #888;
    font-size: 13px;
    margin-bottom: 8px;
}

.source {
    margin-top: auto;
    font-size: 12px;
    color: #888;
    text-align: right;
}

.new-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background-color: red;
    color: white;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 6px;
    border-radius: 8px;
    animation: floatBadge 1.5s ease-in-out infinite;
}

@keyframes floatBadge {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
}

.pagination {
    text-align: center;
    margin-top: 20px;
}

button.action {
    background-color: #0078d7;
    color: white;
    border: none;
    cursor: pointer;
}

button.action:hover {
    background-color: #005fa3;
}

button:disabled {
    background-color: #ccc;
    cursor: not-allowed;
}
</style>
</head>
<body>

<h1>
    ニュースサイトRSSビューア
    <!-- <span class="viewer-counter">Ver.0.2</span> -->
    <div class="viewer-info">
        <div>Ver.0.4</div>
        <div>Last Update : 2026-02-26</div>
    </div>

</h1>
<p class="subtitle">信頼できる情報を、より早く、より正確に。</p>

<div class="tabs">
    <button id="tab-news" class="tab active">ニュース</button>
    <button id="tab-research" class="tab">会社情報</button>
    <button id="tab-expert" class="tab">専門情報</button>
    <button id="tab-info" class="tab">情報サイト</button>
    <button id="refresh" class="action">🔄 更新</button>
</div>

<div class="controls" id="global-controls">

    <input type="text" id="search" placeholder="キーワード検索...">

    <select id="sort">
        <option value="newest">新しい順</option>
        <option value="oldest">古い順</option>
    </select>

    <select id="sourceFilter">
        <option value="all">全ての出典</option>
    </select>

    <select id="companyFilter" style="display:none;">
        <option value="all">全ての会社</option>
    </select>

    <input type="date" id="dateFrom">
    <span>～</span>
    <input type="date" id="dateTo">

    <select id="itemsPerPage">
        <option value="20">20件表示</option>
        <option value="50" selected>50件表示</option>
        <option value="100">100件表示</option>
    </select>

</div>

<div id="news-section">
    <div id="news" class="news-list"></div>
</div>

<div id="research-section" style="display:none;">
    <div id="research" class="research-list"></div>
</div>

<div id="expert-section" style="display:none;">
    <div id="expert" class="news-list"></div>
</div>

<div id="info-section" style="display:none;">
    <div id="info" class="info-list"></div>
</div>

<div class="pagination">
    <button id="prev">前へ</button>
    <span id="pageInfo"></span>
    <button id="next">次へ</button>
</div>


<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function(){

    let ITEMS_PER_PAGE = parseInt(document.getElementById('itemsPerPage').value);
    let currentPage = 1;
    let currentTab = "news";

    const state = {
        news: {all:[], filtered:[]},
        research: {all:[], filtered:[]},
        expert: {all:[], filtered:[]},
        info: {all:[], filtered:[]}
    };

    async function loadCSV(file){
        const res = await fetch(file);
        const text = await res.text();
        return Papa.parse(text,{header:true,skipEmptyLines:true}).data;
    }

    function parseDate(d){
        if(!d) return '';
        const dt=new Date(d);
        return isNaN(dt)?'':d;
    }

    function isToday(d){
        const dt=new Date(d);
        const n=new Date();
        return dt.getFullYear()==n.getFullYear() &&
            dt.getMonth()==n.getMonth() &&
            dt.getDate()==n.getDate();
    }

    function getActiveData(){
        return state[currentTab];
    }

    function applyFilters(){

        const query = document.getElementById('search').value.toLowerCase();

        const sourceElement =
            currentTab === "research"
                ? document.getElementById("companyFilter")
                : document.getElementById("sourceFilter");

        if(!sourceElement) return; // ← 安全装置

        const sourceSel = sourceElement.value;

        const fromInput=document.getElementById('dateFrom').value;
        const toInput=document.getElementById('dateTo').value;
        const fromDate=fromInput?new Date(fromInput+"T00:00:00"):null;
        const toDate=toInput?new Date(toInput+"T23:59:59"):null;
        const sort=document.getElementById('sort').value;

        const tab=state[currentTab];

        tab.filtered = tab.all.filter(r=>{

            const title=(r.title||r.company||"").toLowerCase();
            const desc=(r.description||r.info||"").toLowerCase();

            const matchKeyword=title.includes(query)||desc.includes(query);

            const matchSource =
                sourceSel==="all" ||
                (currentTab==="research"
                    ? r.company===sourceSel
                    : r.source===sourceSel);

            let matchDate=true;
            const d=new Date(r.date);

            if(!isNaN(d)){
                if(fromDate && toDate) matchDate=d>=fromDate && d<=toDate;
                else if(fromDate) matchDate=d>=fromDate;
                else if(toDate) matchDate=d<=toDate;
            }

            return matchKeyword && matchSource && matchDate;
        });

        tab.filtered.sort((a,b)=>{
            return sort==="newest"
                ? new Date(b.date)-new Date(a.date)
                : new Date(a.date)-new Date(b.date);
        });

        currentPage=1;
        render();
}


    function render(){

        const tab=getActiveData();
        const container=document.getElementById(currentTab);
        container.innerHTML="";

        const start=(currentPage-1)*ITEMS_PER_PAGE;
        const items=tab.filtered.slice(start,start+ITEMS_PER_PAGE);

        items.forEach(item=>{
            const div=document.createElement('div');
            div.className='card';

            div.innerHTML=`
                ${isToday(item.date)?'<div class="new-badge">New!</div>':''}
                <div class="date">${parseDate(item.date)}</div>
                <a href="${item.link}" target="_blank">
                    ${item.title||item.company||"(無題)"}
                </a>
                <p>${item.description||item.info||""}</p>
                <div class="source">出典：${item.source||item.company||"不明"}</div>
            `;

            container.appendChild(div);
        });

        const maxPage=Math.ceil(tab.filtered.length/ITEMS_PER_PAGE)||1;
        document.getElementById('pageInfo').textContent=
            `${currentPage} / ${maxPage}`;

        document.getElementById('prev').disabled=currentPage===1;
        document.getElementById('next').disabled=currentPage>=maxPage;
    }

    async function refreshData(){

        state.news.all=await loadCSV('rss.csv');
        state.research.all=await loadCSV('research.csv');
        state.expert.all=await loadCSV('expert.csv');
        state.info.all=await loadCSV('info.csv');

        Object.keys(state).forEach(k=>{
            state[k].filtered=[...state[k].all];
        });

        updateFilterOptions();   // ← 変更
        applyFilters();
    }


    function updateFilterOptions(){

        const sourceEl = document.getElementById("sourceFilter");
        const companyEl = document.getElementById("companyFilter");

        if(currentTab === "research"){

            companyEl.style.display="inline-block";
            sourceEl.style.display="none";

            const vals=[...new Set(state.research.all.map(r=>r.company).filter(Boolean))].sort();
            companyEl.innerHTML =
                '<option value="all">全ての会社</option>'+
                vals.map(v=>`<option value="${v}">${v}</option>`).join('');

        }else{

            companyEl.style.display="none";
            sourceEl.style.display="inline-block";

            const vals=[...new Set(state[currentTab].all.map(r=>r.source).filter(Boolean))].sort();
            sourceEl.innerHTML =
                '<option value="all">全ての出典</option>'+
                vals.map(v=>`<option value="${v}">${v}</option>`).join('');
        }
    }



    function switchTab(tab){

        currentTab = tab;
        currentPage = 1;

        ["news","research","expert","info"].forEach(t=>{
            document.getElementById(t+"-section").style.display =
                t===tab ? "block":"none";
            document.getElementById("tab-"+t)
                .classList.toggle("active",t===tab);
        });

        updateFilterOptions();   // ← ★追加
        applyFilters();
    }



    /* --- イベント --- */

    document.getElementById('search').addEventListener('input',applyFilters);
    document.getElementById('sort').addEventListener('change',applyFilters);
    document.getElementById('dateFrom').addEventListener('change',applyFilters);
    document.getElementById('dateTo').addEventListener('change',applyFilters);
    document.getElementById('sourceFilter').addEventListener('change',applyFilters);
    document.getElementById('companyFilter').addEventListener('change',applyFilters);
    document.getElementById('itemsPerPage').addEventListener('change',()=>{
        ITEMS_PER_PAGE=parseInt(itemsPerPage.value);
        currentPage=1;
        render();
    });

    document.getElementById('prev').onclick=()=>{
        if(currentPage>1){currentPage--;render();}
    };
    document.getElementById('next').onclick=()=>{
        currentPage++;render();
    };

    document.getElementById('tab-news').onclick=()=>switchTab("news");
    document.getElementById('tab-research').onclick=()=>switchTab("research");
    document.getElementById('tab-expert').onclick=()=>switchTab("expert");
    document.getElementById('tab-info').onclick=()=>switchTab("info");

    document.getElementById('refresh').onclick=refreshData;

    refreshData();
    });
</script>

</body>
</html>
